<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đào Tạo Cao Cấp</title>
    <style>
        /* ==========================================================================
           HỆ THỐNG BIẾN MÀU THEO CHÍNH XÁC PALETTE ẢNH CỦA BẠN
           ========================================================================== */
        
        /* 1. CHẾ ĐỘ SÁNG: ĐỒNG BỘ CHÍNH XÁC THEO CÁC MÃ HEX TRÊN ẢNH CỦA BẠN */
        :root {
            --bg-body: #F0F3FA;          /* Màu thứ 1: Trắng xanh làm nền cực dịu */
            --card-main-bg: #ffffff;     /* Trắng tinh khiết để làm nổi bật khối menu */
            --card-item-bg: #F0F3FA;     /* Màu thứ 1 dùng lại cho card con */
            --border-item: #D5DEEF;      /* Màu thứ 2: Làm đường viền sắc nét */
            
            --text-title: #395886;       /* Màu thứ 6: Xanh đậm nhất dùng cho tiêu đề chính */
            --text-main: #395886;        /* Tên môn học hiển thị rõ ràng, đậm đà */
            --accent-color: #628ECB;     /* Màu thứ 5: Xanh lam làm điểm nhấn chỉ hướng */
            --accent-glow: rgba(98, 142, 203, 0.2);
            
            /* Cấu hình màu sắc tối ưu riêng cho Tag danh mục mới */
            --tag-bg: #F0F3FA;           /* Nền trắng xanh nhạt thoáng đãng */
            --tag-border: #D5DEEF;       /* Viền định hình khối rõ nét */
            --tag-text: #395886;         /* Chữ tag màu xanh đậm sắc nét */
            
            --icon-bg: #8AAEE0;          /* Màu thứ 4: Nền ô Icon */
            
            /* Đổ bóng đổ khối rõ ràng chống chìm */
            --main-shadow: 0 20px 40px -10px rgba(57, 88, 134, 0.12);
            --item-shadow: 0 4px 10px rgba(57, 88, 134, 0.04);
            --item-shadow-hover: 0 12px 20px -5px rgba(57, 88, 134, 0.25);
        }

        /* 2. CHẾ ĐỘ TỐI: ĐEN - XANH LÁ CODING / ESPORTS */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #060608;
                --card-main-bg: #121215;
                --card-item-bg: #1a1a1f;
                --border-item: #25252b;
                
                --text-title: #ffffff;
                --text-main: #e4e4e7;
                --accent-color: #00cd6c; /* Xanh lá đặc trưng */
                --accent-glow: rgba(0, 205, 108, 0.2);
                
                /* Tối ưu màu Tag riêng cho chế độ tối */
                --tag-bg: rgba(0, 205, 108, 0.08);
                --tag-border: rgba(0, 205, 108, 0.3);
                --tag-text: #00cd6c;
                
                --icon-bg: #25252b;
                
                --main-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
                --item-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
                --item-shadow-hover: 0 0 25px rgba(0, 205, 108, 0.35), 0 10px 20px rgba(0, 0, 0, 0.5);
            }
        }

        /* ==========================================================================
           CẤU TRÚC GIAO DIỆN CAO CẤP VÀ NỔI KHỐI (UI/UX PREMIUM)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 80px 24px; 
            transition: background-color 0.4s ease;
        }

        .wrapper {
            width: 100%;
            max-width: 1140px; 
        }

        /* ĐÃ CẬP NHẬT: Khu vực tiêu đề lớn chứa cả logo và chữ */
        .title-container {
            display: flex;
            align-items: center;
            gap: 20px;                  /* Khoảng cách giữa cụm logo và chữ */
            margin-bottom: 45px; 
            padding-left: 4px;
        }

        /* Khung bọc logo để khống chế kích thước */
        .title-logo {
            width: 54px;                /* Độ rộng logo vừa vặn với chữ h1 lớn */
            height: 54px;               /* Tỷ lệ vuông hoặc tự cân đối */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;             /* Đảm bảo logo không bị bóp méo trên mobile */
        }

        .title-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;        /* Giữ nguyên tỷ lệ gốc của file ảnh logo */
        }

        .title-container h1 {
            font-size: 2.4rem;
            font-weight: 850;
            height: inherit;
            color: var(--text-title);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            line-height: 1.1;
            padding-left: 20px;
            border-left: 6px solid var(--text-title); /* Giữ thanh đứng bo dọc sang trọng ngăn cách */
            transition: color 0.4s ease, border-color 0.4s ease;
        }

        .title-container h2 {
            font-size: 1.5rem;
            font-weight: 850;
            height: inherit;
            color: var(--text-title);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            line-height: 1.1;
            padding-left: 20px;
            border-left: 6px solid var(--text-title); /* Giữ thanh đứng bo dọc sang trọng ngăn cách */
            transition: color 0.4s ease, border-color 0.4s ease;
        }

        @media (prefers-color-scheme: dark) {
            .title-container h1 {
                border-left-color: var(--accent-color); /* Đổi thanh dọc sang xanh lá khi ở chế độ tối */
            }
        }

        /* Card mẹ chứa nội dung */
        .menu-section {
            background: var(--card-main-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--main-shadow);
            border: 1px solid var(--border-item);
            margin-bottom: 40px;
            transition: all 0.4s ease;
        }

        /* Nhãn danh mục nhóm ngành */
        .group-title-container {
            display: flex;
            align-items: center;
            margin-bottom: 32px;
        }

        .group-title-tag {
            display: inline-flex;
            align-items: center;
            gap: 12px;                  
            background-color: var(--tag-bg); 
            color: var(--tag-text);            
            font-size: 0.8rem;        
            font-weight: 800;            
            text-transform: uppercase; 
            letter-spacing: 0.08em;      
            padding: 8px 20px;           
            border-radius: 100px;        
            border: 1px solid var(--tag-border);
            box-shadow: 0 2px 6px rgba(57, 88, 134, 0.04);
            transition: all 0.3s ease;
        }

        .group-title-tag::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: var(--tag-text); 
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 4px var(--tag-text);
        }

        /* Khung lưới 2 cột */
        .menu-grid-columns {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 24px; 
            width: 100%;
        }

        .menu-col {
            display: flex;
            flex-direction: column;
            gap: 16px; 
        }

        /* CARD MÔN HỌC RIÊNG BIỆT - NỔI KHỐI 3D */
        .menu-row {
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: 22px 24px;
            background-color: var(--card-item-bg);
            border-radius: 16px;
            border: 1px solid var(--border-item);
            box-shadow: var(--item-shadow);
            position: relative;
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            width: 100%;
        }

        /* Khung tròn chứa Icon */
        .menu-thumbnail {
            width: 44px;
            height: 44px;
            background-color: var(--icon-bg);
            border-radius: 12px;
            margin-right: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }

        .menu-thumbnail::after {
            content: '📂'; 
            font-size: 1.2rem;
            opacity: 0.9;
            transition: all 0.25s ease;
        }

        /* Tên chữ môn học rõ ràng, tương phản cao */
        .menu-text {
            font-size: 1.2rem;
            color: var(--text-main); 
            font-weight: 700;
            letter-spacing: -0.01em;
            transition: color 0.25s ease;
        }

        /* Mũi tên góc phải dẫn đường xuất hiện mượt mà khi di chuột */
        .menu-row::after {
            content: '→';
            position: absolute;
            right: 24px;
            color: var(--text-title);
            font-size: 1.4rem;
            font-weight: bold;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.25s ease;
        }

        /* ==========================================================================
           HIỆU ỨNG TƯƠNG TÁC DI CHUỘT CAO CẤP (HOVER EFFECTS)
           ========================================================================== */
        .menu-row:hover {
            transform: translateY(-5px); 
            box-shadow: var(--item-shadow-hover);
            background-color: #ffffff;   
            border-color: var(--text-title); 
            padding-right: 52px; 
        }

        @media (prefers-color-scheme: dark) {
            .menu-row:hover {
                background-color: #22222a; 
                border-color: var(--accent-color);
            }
        }

        .menu-row:hover .menu-text {
            color: var(--text-title); 
        }

        .menu-row:hover .menu-thumbnail {
            background-color: var(--accent-glow);
            transform: scale(1.08);
        }

        .menu-row:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        /* ==========================================================================
           TỐI ƯU TRÊN ĐIỆN THOẠI (RESPONSIVE MOBILE)
           ========================================================================== */
        @media (max-width: 768px) {
            body {
                padding: 40px 16px;
            }

            /* Thu nhỏ kích thước tiêu đề và logo trên mobile tránh tràn hàng */
            .title-container {
                gap: 12px;
                margin-bottom: 30px;
            }

            .title-logo {
                width: 40px;
                height: 40px;
            }

            .title-container h1 {
                font-size: 1.5rem;
                padding-left: 12px;
                border-left-width: 4px;
            }

            .menu-section {
                padding: 24px 16px;
                border-radius: 20px;
            }

            .menu-grid-columns {
                grid-template-columns: 1fr; 
                gap: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <div class="title-container">
            <div class="title-logo">
                <img src="nkdmenutong.png" alt="Logo">
            </div>
            <div>
            <h1>HỆ THỐNG PHẦN MỀM ĐÀO TẠO </h1>
            <h2>GV Nguyễn Khánh Dương</h2> 
            </div>
        </div>

        <div class="menu-section">
            <div class="group-title-container">
                <div class="group-title-tag">Khai báo hải quan</div>
            </div>
            
            <div class="menu-grid-columns">
                
                <div class="menu-col">
                    <a href="https://khanhdat01507.github.io/menu/" class="menu-row">
                        <div class="menu-thumbnail"></div>
                        <span class="menu-text">Hệ thống khai báo</span>
                    </a>
                </div>

            </div> 
        </div>

    </div>

    

</body>
</html>
